<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
            padding:20px;
        }
        .card{
            background:white;
            padding:15px;
            margin:10px 0;
            border-radius:8px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<h1>User Dashboard</h1>

{% for course in courses %}
<div class="card">
    <h2>{{ course.title }}</h2>
    <p>{{ course.description }}</p>
    <strong>₹{{ course.price }}</strong>
</div>
{% endfor %}

</body>
</html>
